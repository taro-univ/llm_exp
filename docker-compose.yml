#version: '3.8'
services:
  # 既存の解析・研究用コンテナ
  app:
    build:
      context: .
      dockerfile: Dockerfile
    tty: true
    volumes:
      - .:/workspace:cached
    # RTX 5070 を使うための設定を維持
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - DATABASE_URL=postgresql://shona_user:shona_pass@db:5432/hanoi_research_db
    depends_on:
      - db

  # 新しく追加する PostgreSQL コンテナ
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shona_user
      POSTGRES_PASSWORD: shona_pass
      POSTGRES_DB: hanoi_research_db
    # データが消えないように WSL 側に保存
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: